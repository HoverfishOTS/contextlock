name: Supabase Keep-Alive

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: SUPABASE_URL or SUPABASE_ANON_KEY secrets are missing."
            exit 1
          fi

          echo "Pinging Supabase API to keep project active..."
          
          # Hitting a dummy table ensures we touch the database.
          # It will likely return a 400 or 404, which is expected and means the ping succeeded.
          response=$(curl -s -w "%{http_code}" -o /dev/null \
            "${SUPABASE_URL}/rest/v1/_keepalive_dummy_table_?select=*" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          
          # If the response code is > 0, we successfully reached the server.
          # A curl error (e.g. invalid URL) would return 000.
          if [ "$response" -ne 000 ]; then
            echo "Successfully pinged Supabase (HTTP $response)."
          else
            echo "Failed to reach Supabase (HTTP $response). Check your SUPABASE_URL."
            exit 1
          fi
