name: Simulate GA4 Users Traffic

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to run the simulation against (e.g. your Vercel deployment URL)'
        required: true
        default: 'https://your-vercel-domain.vercel.app'
      users_per_node:
        description: 'Number of simulated users per IP node'
        required: false
        default: '20'

jobs:
  simulate:
    runs-on: ubuntu-latest
    strategy:
      # This runs 5 identical jobs simultaneously on 5 DIFFERENT GitHub cloud computers.
      # This guarantees 5 distinct IP addresses, bypassing basic GA bot filtering.
      matrix:
        node: [1, 2, 3, 4, 5]
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: Run Simulation Script
        run: node scripts/simulate_ga_users.mjs "${{ github.event.inputs.target_url }}" "${{ github.event.inputs.users_per_node }}"
