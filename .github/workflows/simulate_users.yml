name: Simulate GA4 Users Traffic

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to run the simulation against (e.g. your Vercel deployment URL)'
        required: true
        default: 'https://your-vercel-domain.vercel.app'
      num_users:
        description: 'Number of simulated users (overrides default in script if supported, but script currently hardcoded to 100)'
        required: false
        default: '100'

jobs:
  simulate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: Run Simulation Script
        run: node scripts/simulate_ga_users.mjs "${{ github.event.inputs.target_url }}"
